# ════════════════════════════════════════════════════════════════
#  SNAKE ANIMATION WORKFLOW
#  → put this file at:  .github/workflows/snake.yml
#     (inside the TSM-ArpitSG/TSM-ArpitSG repo)
#  It regenerates the snake SVG every 12h and on each push, and
#  publishes it to an "output" branch — which the README points to.
#  After adding it: Actions tab → "Generate Snake" → Run workflow (first run).
# ════════════════════════════════════════════════════════════════
name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # lets you run it manually
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gen
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00E5FF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
